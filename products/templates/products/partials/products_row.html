<tr class="hover:bg-gray-750 transition" hx-target="this" hx-swap="outerHTML">
    <td class="py-4 text-gray-500">#{{ product.id }}</td>
    <td class="py-4 font-semibold text-white">{{ product.name }}</td>
    <td class="py-4 text-emerald-400">${{ product.price }}</td>
    <td class="py-4">
        <span class="px-2 py-1 bg-gray-700 rounded text-xs font-mono text-gray-300">
            {{ product.stock }} units
        </span>
    </td>
    <td class="py-4">
        <button hx-delete="/api/products/dashboard/delete/{{ product.id }}/" 
                hx-confirm="Are you sure you want to delete this item?"
                class="bg-red-900/50 text-red-400 hover:bg-red-900 px-3 py-1 rounded text-xs transition font-medium">
            Delete
        </button>
    </td>
</tr>

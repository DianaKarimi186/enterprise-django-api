<div class="bg-red-900/50 border border-red-700 text-red-300 rounded-lg p-4 text-sm flex items-center justify-between shadow-md">

    <div class="flex items-center gap-2">
        <span class="font-bold">⚠️ Validation Error:</span>
        <span>{{ error_message }}</span>
    </div>

    <button
        onclick="this.parentElement.remove()"
        class="text-red-400 hover:text-red-200 transition text-xs font-bold uppercase tracking-wider px-2 py-1">

        Dismiss

    </button>

</div>

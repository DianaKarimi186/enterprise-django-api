<tr id="product-{{ product.id }}">

    <td class="py-4 text-gray-500">
        #{{ product.id }}
    </td>

    <td class="py-4">
        <input
            type="text"
            name="name"
            value="{{ product.name }}"
            form="edit-product-{{ product.id }}"
            class="bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white">
    </td>

    <td class="py-4">
        <input
            type="number"
            step="0.01"
            name="price"
            value="{{ product.price }}"
            form="edit-product-{{ product.id }}"
            class="bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white">
    </td>

    <td class="py-4">
        <input
            type="number"
            name="stock"
            value="{{ product.stock }}"
            form="edit-product-{{ product.id }}"
            class="bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white">
    </td>

    <td class="py-4">

        <form
            id="edit-product-{{ product.id }}"
            hx-put="/api/products/dashboard/update/{{ product.id }}/"
            hx-target="#product-{{ product.id }}"
            hx-swap="outerHTML">

            <button
                type="submit"
                class="bg-emerald-900/50 text-emerald-400 px-3 py-1 rounded text-xs">

                Save

            </button>

        </form>

    </td>

</tr>
